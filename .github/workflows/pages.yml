name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so the home page's "today's matches" tracks the real date.
  # generate_site.py resolves "today" in the tournament timezone (Eastern by
  # default); 05:00 UTC is just past local midnight there (00:00 EST / 01:00
  # EDT), so the rebuilt page flips to the new day's fixtures. GitHub cron is
  # UTC and best-effort, so the exact minute may drift.
  schedule:
    - cron: "0 5 * * *"

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Validate data
        run: python3 scripts/validate.py
      - name: Build static site
        run: python3 scripts/generate_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
