name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so the home page's "today's matches" tracks the real date.
  # GitHub cron is UTC and runs on a best-effort schedule.
  schedule:
    - cron: "0 6 * * *"

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Validate data
        run: python3 scripts/validate.py
      - name: Build static site
        run: python3 scripts/generate_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
