name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Rebuild daily so the home page's "today's matches" tracks the real date.
  # generate_site.py resolves "today" in the tournament timezone (Eastern by
  # default); 05:00 UTC is just past local midnight there (00:00 EST / 01:00
  # EDT), so the rebuilt page flips to the new day's fixtures. GitHub cron is
  # UTC and best-effort, so the exact minute may drift.
  schedule:
    - cron: "0 5 * * *"

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install validation dependency
        run: python3 -m pip install -r requirements.txt
      - uses: actions/configure-pages@v5
      - name: Validate data
        run: python3 scripts/validate.py
      - name: Run tests
        run: python3 -m unittest discover -v
      # Refresh World Football Elo into the working tree before building. The
      # ratings change after every international and feed the football odds
      # model, so the daily rebuild should use current values. This is
      # ephemeral (not committed) — same model as "today's matches": the site
      # is a fresh function of the committed data plus live state at build
      # time. Non-fatal: if eloratings.net is down or changes format, the build
      # falls back to the committed elo_* values instead of failing the deploy.
      - name: Refresh Elo ratings (non-fatal; falls back to committed values)
        run: python3 scripts/harvest_elo_ratings.py --apply || echo "::warning::Elo refresh failed; building with committed ratings"
      - name: Validate refreshed data
        run: python3 scripts/validate.py
      - name: Build static site
        run: python3 scripts/generate_site.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
